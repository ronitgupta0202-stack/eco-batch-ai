services:
  # Backend Node Service
  - type: web
    name: ecobatch-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false # You must set this in the Render dashboard (Settings -> Environment)

  # Frontend Static Site
  - type: web
    name: ecobatch-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ecobatch-backend
          envVarKey: RENDER_EXTERNAL_URL
